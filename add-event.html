<main>
    <section>
        <h1>Add New Event</h1>
        <form id="add-event-form">
            <label for="event-name">Event Name</label>
            <input type="text" id="event-name" name="eventName" placeholder="e.g. Annual Tech Fest" required>

            <label for="category">Category</label>
            <select id="category" name="category" required>
                <option value="fest">Fest</option>
                <option value="workshop">Workshop</option>
                <option value="sports">Sports</option>
                <option value="club">Club</option>
            </select>

            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>

            <label for="time">Time</label>
            <input type="time" id="time" name="time" required>

            <label for="venue">Venue</label>
            <input type="text" id="venue" name="venue" required>

            <label for="description">Description</label>
            <textarea id="description" name="description" rows="5" required></textarea>

            <label for="organiser-name">Organiser Name</label>
            <input type="text" id="organiser-name" name="organiserName" required>

            <label for="organiser-email">Organiser Email</label>
            <input type="email" id="organiser-email" name="organiserEmail" required>

            <button type="submit">Submit Event</button>
        </form>
    </section>
</main>
